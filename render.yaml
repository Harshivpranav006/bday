# Web Service (NOT Static Site)
services:
  - type: web
    name: shamm-birthday
    runtime: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
      - key: HOSTNAME
        value: "0.0.0.0"
